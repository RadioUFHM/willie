<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Willie">
  <title>Willie</title>
  <link rel="manifest" href="manifest.json">
  <!-- Add icons/icon-192.png and icons/icon-512.png for full PWA install support -->
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
</head>
<body>
  <div id="app">
    <div id="view" class="view"></div>
    <nav id="nav">
      <button class="nav-btn active" data-view="home" onclick="navigate('home')">
        <span class="nav-icon">⌂</span>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-view="fcit" onclick="navigate('fcit')">
        <span class="nav-icon">◈</span>
        <span>FCIT</span>
      </button>
      <button class="nav-btn" data-view="opf" onclick="navigate('opf')">
        <span class="nav-icon">◇</span>
        <span>OPF</span>
      </button>
      <button class="nav-btn" data-view="creative" onclick="navigate('creative')">
        <span class="nav-icon">✦</span>
        <span>Creative</span>
      </button>
    </nav>
    <div id="modal" class="modal hidden"></div>
    <div id="toast" class="toast"></div>
    <input type="file" id="list-photo" accept="image/*" capture="environment" style="display:none">
  </div>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="app.js"></script>
</body>
</html>
