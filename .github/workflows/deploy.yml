name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject config.js
        run: |
          cat > config.js <<'ENDOFCONFIG'
          const CONFIG = {
            ANTHROPIC_API_KEY: 'ANTHROPIC_API_KEY_PLACEHOLDER',
            GOOGLE_CLIENT_ID: 'GOOGLE_CLIENT_ID_PLACEHOLDER',
            SHEET_ID: 'SHEET_ID_PLACEHOLDER',
            CONTEXT_DOC_ID: 'CONTEXT_DOC_ID_PLACEHOLDER',
          };
          ENDOFCONFIG
          sed -i "s|ANTHROPIC_API_KEY_PLACEHOLDER|${{ secrets.ANTHROPIC_API_KEY }}|g" config.js
          sed -i "s|GOOGLE_CLIENT_ID_PLACEHOLDER|${{ secrets.GOOGLE_CLIENT_ID }}|g" config.js
          sed -i "s|SHEET_ID_PLACEHOLDER|${{ secrets.SHEET_ID }}|g" config.js
          sed -i "s|CONTEXT_DOC_ID_PLACEHOLDER|${{ secrets.CONTEXT_DOC_ID }}|g" config.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
